<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="robots" content="noindex,nofollow,noarchive">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Procivil x NewCo — Acceso protegido</title>
<style>
  :root{--green:#063f3f;--lime:#d8df19;--black:#101315;--muted:#66706d;--line:#dfe5dd;--soft:#f5f7f3}
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:grid;place-items:center;background:#fff;font-family:Inter,Arial,Helvetica,sans-serif;color:var(--black);overflow:hidden}
  body:before{content:"";position:fixed;inset:-30%;background:radial-gradient(circle at 20% 20%, rgba(216,223,25,.20), transparent 28%),radial-gradient(circle at 80% 70%, rgba(6,63,63,.12), transparent 30%);z-index:-1}
  .card{width:min(520px,92vw);border:1px solid var(--line);border-radius:34px;padding:34px;background:rgba(255,255,255,.86);backdrop-filter:blur(16px);box-shadow:0 30px 90px rgba(6,63,63,.16)}
  .bar{height:7px;border-radius:999px;background:linear-gradient(90deg,var(--green),var(--lime));margin-bottom:30px}
  .kicker{font-size:12px;text-transform:uppercase;letter-spacing:.22em;color:var(--green);font-weight:900;margin-bottom:12px}
  h1{font-size:44px;line-height:.95;letter-spacing:-.055em;margin:0 0 16px;color:var(--black)}
  p{margin:0 0 24px;color:#34413d;font-size:16px;line-height:1.45}
  .form{display:grid;gap:12px}
  input{width:100%;border:1px solid var(--line);border-radius:18px;padding:16px 18px;font-size:16px;outline:none;background:#fff}
  input:focus{border-color:var(--green);box-shadow:0 0 0 4px rgba(6,63,63,.10)}
  button{border:0;border-radius:18px;padding:16px 18px;font-size:16px;font-weight:900;background:var(--green);color:#fff;cursor:pointer;transition:transform .18s ease, box-shadow .18s ease}
  button:hover{transform:translateY(-2px);box-shadow:0 14px 34px rgba(6,63,63,.20)}
  .error{min-height:20px;color:#9f1f16;font-weight:800;font-size:14px;margin-top:10px}
  .note{font-size:12px;color:var(--muted);margin-top:18px}
  .loading{display:none;color:var(--green);font-weight:900;margin-top:12px}
</style>
</head>
<body>
  <main class="card">
    <div class="bar"></div>
    <div class="kicker">Acceso protegido</div>
    <h1>Procivil x NewCo</h1>
    <p>Introduce la contraseña para abrir el dossier visual. El contenido está cifrado en este archivo y se descifra localmente en tu navegador.</p>
    <div class="form">
      <input id="password" type="password" placeholder="Contraseña" autocomplete="current-password" autofocus>
      <button id="unlock">Abrir dossier</button>
    </div>
    <div id="loading" class="loading">Descifrando dossier…</div>
    <div id="error" class="error"></div>
    <div class="note">Uso interno. No reenvíes el enlace ni la contraseña sin autorización.</div>

function b64ToBytes(b64) {
  const bin = atob(b64);
  const bytes = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
  return bytes;
}

async function deriveKey(password, salt, iterations) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey(
    "raw",
    enc.encode(password),
    {name: "PBKDF2"},
    false,
    ["deriveKey"]
  );
  return crypto.subtle.deriveKey(
    {name: "PBKDF2", salt, iterations, hash: "SHA-256"},
    keyMaterial,
    {name: "AES-GCM", length: 256},
    false,
    ["decrypt"]
  );
}

async function unlock() {
  const password = document.getElementById("password").value;
  const err = document.getElementById("error");
  const loading = document.getElementById("loading");
  err.textContent = "";
  if (!password) {
    err.textContent = "Introduce la contraseña.";
    return;
  }
  loading.style.display = "block";
  try {
    const salt = b64ToBytes(encryptedPayload.salt);
    const iv = b64ToBytes(encryptedPayload.iv);
    const ciphertext = b64ToBytes(encryptedPayload.ciphertext);
    const key = await deriveKey(password, salt, encryptedPayload.iterations);
    const plainBuffer = await crypto.subtle.decrypt({name: "AES-GCM", iv}, key, ciphertext);
    const html = new TextDecoder().decode(plainBuffer);
    document.open();
    document.write(html);
    document.close();
  } catch (e) {
    err.textContent = "Contraseña incorrecta o archivo dañado.";
  } finally {
    loading.style.display = "none";
  }
}

document.getElementById("unlock").addEventListener("click", unlock);
document.getElementById("password").addEventListener("keydown", (e) => {
  if (e.key === "Enter") unlock();
});
